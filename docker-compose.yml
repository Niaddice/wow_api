version: '3.8'

services:
  wow_api:
    build: .
    container_name: wow_api_service
    restart: always
    ports:
      - "8002:8002"
    networks:
      - common_network
    environment:
      - TZ=Asia/Shanghai
      # 数据库连接信息
      - DB_HOST=mysql8
      - DB_PORT=3306
      - DB_USER=root
      - DB_PASSWORD=123456
      - DB_NAME=wow_hong
      # 应用程序端口配置
      - APP_PORT=8002

networks:
  common_network:
    external: true